name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & vet
    runs-on: ubuntu-latest
    env:
      # Server build uses CGO + libvpx/libopus when targeting Linux;
      # the CGO-gated screen-capture path is exercised by the Docker build.
      # CI builds the pure-Go fallback, which keeps the runner image minimal.
      CGO_ENABLED: 0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build -trimpath -ldflags="-s -w" ./...

      - name: Test
        run: go test -count=1 ./...
